<svg xmlns="http://www.w3.org/2000/svg" width="130" height="162" viewBox="0 0 130 162">
  <defs>
    <linearGradient id="bgRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff5360"/>
      <stop offset="100%" stop-color="#ed263b"/>
    </linearGradient>
    <linearGradient id="coin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd85a"/>
